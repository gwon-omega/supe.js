name: extension-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-sign-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension deps
        run: npm install

      - name: Run extension host tests
        run: npm run test:host

      - name: Package VSIX
        run: npx @vscode/vsce package --out supe-toolkit.vsix

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Sign VSIX (keyless)
        run: cosign sign-blob --yes --output-signature supe-toolkit.vsix.sig supe-toolkit.vsix

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
